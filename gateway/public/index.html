<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  </head>
  <body class="bg-light">
    <div class="container py-5" x-data="shop()" x-init="init()">
      <h1 class="mb-3">Shop</h1>

      <div class="card mb-4">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <div>
              <h5>Architecture</h5>
              <span class="badge text-bg-secondary" x-text="archLabel || 'unknown'"></span>
            </div>
            <div class="text-end">
              <h5>Last request</h5>
              <div x-text="lastReq.label || '—'"></div>
              <div x-text="lastReq.ms != null ? `${lastReq.ms.toFixed(1)} ms` : '—'"></div>
            </div>
          </div>
        </div>
      </div>

      <div x-show="msg" :class="`alert alert-${msgType}`" x-text="msg"></div>

      <div class="row g-3">
        <template x-for="p in products" :key="p.id">
          <div class="col-6">
            <div class="card p-3 shadow-sm">
              <h5 x-text="p.name"></h5>
              <p>&euro;<span x-text="p.price"></span></p>
              <button @click="buy(p.id)" class="btn btn-primary">Buy</button>
            </div>
          </div>
        </template>
      </div>
    </div>

    <script>
      function shop() {
        return {
          products: [
            { id: 1, name: "Widget", price: 19.99 },
            { id: 2, name: "Gadget", price: 29.99 }
          ],
          msg: "",
          msgType: "info",
          archLabel: "",
          lastReq: {},

          async timedJson(method, path, options = {}) {
            const start = performance.now();
            const res = await fetch(path, { method, ...options });
            const data = await res.json().catch(() => ({}));
            const ms = performance.now() - start;
            this.lastReq = { label: `${method} ${path}`, ms };
            if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
            return data;
          },

          async init() {
            const info = await this.timedJson("GET", "/api/arch");
            this.archLabel = info.arch || "unknown";
          },

          async buy(id) {
            try {
              const data = await this.timedJson("POST", "/api/checkout", {
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ productId: id, quantity: 1 })
              });
              this.msg = `Checkout succeeded. Total: €${data.total}`;
              this.msgType = "success";
            } catch (e) {
              this.msg = e.message;
              this.msgType = "danger";
            }
          }
        };
      }
    </script>
  </body>
</html>
