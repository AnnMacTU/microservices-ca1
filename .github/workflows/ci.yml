name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Start backend
        run: |
          cd backend
          node server.js > backend.log 2>&1 &
          sleep 10

      - name: Run backend smoke test
        run: |
          cd backend
          node test-ci.js

      - name: Show backend log on failure
        if: failure()
        run: |
          cd backend
          cat backend.log